<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<title>Scramjet | 404</title>
	<link rel="shortcut icon" href="/favicon.ico" />
	<style>
		@import url("https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap");

		:root {
			--bg-0: #0a0d13;
			--bg-1: #121a29;
			--panel: rgba(14, 19, 30, 0.78);
			--panel-border: rgba(144, 178, 255, 0.2);
			--text: #f5f8ff;
			--text-soft: #afbcda;
			--accent: #7bc4ff;
			--radius: 14px;
		}

		* {
			box-sizing: border-box;
		}

		html,
		body {
			margin: 0;
			min-height: 100%;
		}

		body {
			font-family: "Roboto", Arial, Helvetica, sans-serif;
			color: var(--text);
			background:
				radial-gradient(1100px 600px at 12% -12%, rgba(84, 154, 255, 0.22), transparent 60%),
				radial-gradient(900px 500px at 100% 0%, rgba(96, 243, 209, 0.2), transparent 58%),
				linear-gradient(165deg, var(--bg-0), var(--bg-1));
			display: grid;
			place-items: center;
			padding: 20px;
		}

		.panel {
			width: min(680px, 100%);
			background: var(--panel);
			border: 1px solid var(--panel-border);
			border-radius: var(--radius);
			padding: 28px;
			backdrop-filter: blur(14px);
			box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
		}

		.logo {
			width: min(28vw, 130px);
			min-width: 84px;
			height: auto;
			filter: drop-shadow(0 8px 26px rgba(123, 196, 255, 0.24));
		}

		h1 {
			margin: 16px 0 8px;
			font-size: clamp(1.45rem, 3vw, 2rem);
			font-weight: 500;
		}

		p {
			margin: 0;
			color: var(--text-soft);
			line-height: 1.55;
		}

		.actions {
			display: flex;
			flex-wrap: wrap;
			gap: 10px;
			margin-top: 18px;
		}

		a.btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			padding: 8px 12px;
			border-radius: 10px;
			border: 1px solid rgba(153, 186, 255, 0.35);
			background: rgba(23, 32, 50, 0.68);
			color: var(--text);
			text-decoration: none;
			transition: background-color 0.2s ease, border-color 0.2s ease;
		}

		a.btn:hover {
			background: rgba(37, 50, 76, 0.8);
			border-color: rgba(153, 186, 255, 0.55);
		}

		.meta {
			margin-top: 18px;
			font-size: 0.86rem;
			color: var(--text-soft);
		}
	</style>
</head>
<body>
	<main class="panel">
		<img class="logo" src="/sj.png" alt="Scramjet logo" />
		<h1>Page Not Found</h1>
		<p>The server could not route this request. The link may be broken, moved, or unavailable.</p>
		<div class="actions">
			<a class="btn" href="/">Back to Home</a>
		</div>
	</main>
</body>
</html>
